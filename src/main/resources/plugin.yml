name: bloodsex
version: '1.0-SNAPSHOT'
main: boo.bloodstone.bloodsex.Bloodsex
api-version: '1.21.11'
folia-supported: true

commands:
  bj:
    description: description
    usage: /bj [ник]
    permission: bloodsex.sex
  doggy:
    description: description
    usage: /doggy [ник]
    permission: bloodsex.sex
  marry:
      description: description
      usage: /marry [ник]
      permission: bloodsex.sex
  rape:
    description: description
    usage: /rape [bj|doggy] [ник]
    permission: bloodsex.rape
  accept:
    description: description
    usage: /accept [ник]
    permission: bloodsex.sex
  sex:
    description: sex
